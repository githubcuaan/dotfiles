# ~/.config/tmux/tmux.conf

# 1. Load các config con
source-file ~/.config/tmux/configs/options.conf
source-file ~/.config/tmux/configs/keybinds.conf

# 2. Plugins List
set-environment -g TMUX_PLUGIN_MANAGER_PATH ~/.config/tmux/plugins

# Tmux Plugin Manager
set -g @plugin 'tmux-plugins/tpm'

source-file ~/.config/tmux/configs/plugins.conf

# 3. Plugin Specific Settings (Non-UI)
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-processes 'ssh psql mysql sqlite3'
set -g @resurrect-processes '"~nvim->nvim *"'
set -g @sessionx-bind 'o'
set -g @resurrect-capture-pane-contents "on"
set -g @continuum-restore "on"

# floating pane config
source-file ~/.config/tmux/configs/utilities.conf

# 4. Load UI Config 
source-file ~/.config/tmux/configs/theme/rose-pine.conf

# 5. Initialize TMUX plugin manager (keep this at the very bottom)
run '~/.config/tmux/plugins/tpm/tpm'

# do it if using nord
setw -g pane-active-border-style "bg=default,fg=blue"
setw -g pane-border-style "bg=default,fg=default"

# set -g default-shell /usr/bin/fish
set -g default-shell /usr/bin/zsh
