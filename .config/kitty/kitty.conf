# --- Shell ---
# Mặc định dùng fish như bồ muốn
shell fish
editor nvim
# --- Font (Giao diện) --- 
font_family      JetBrains Mono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        11.0

# letter-spacing=0 (mặc định là 0 rồi, nhưng thích thì chỉnh ở đây)
modify_font cell_width 90%

# Render kiểu cũ cho nét
text_composition_strategy legacy
#
# --- Cursor (Con trỏ) ---
cursor_shape beam
cursor_beam_thickness 1.5

# --- Animation Cursor ---
cursor_trail 7
cursor_trail_start_threshold 0 
cursor_trail_decay 0.1 0.4


# --- Scrollback ---
scrollback_lines 10000

# --- Window & Padding ---
# Foot để 25x20 (Ngang x Dọc). Kitty nhận theo thứ tự: Top Right Bottom Left
# Hoặc 2 giá trị: Dọc Ngang. Nên ta set là 20 25
window_padding_width 15 20
background_blur 1

# --- Colors & Opacity ---
background_opacity 0.82
# bold-text-in-bright=no (Kitty mặc định không force bright color cho bold text)

# --- Key Bindings (Phím tắt) ---
map page_up scroll_page_up
map page_down scroll_page_down
# Search: Kitty dùng chế độ scrollback buffer để search
# Bấm Ctrl+Shift+F nó sẽ mở 1 cái pager (thường là less) để bồ search
map ctrl+shift+f show_scrollback

shell_integration enabled
sync_to_monitor yes
